{% extends 'base.html' %}

{% block head %}
<title>Share Pulse</title>
<style>
    .share-page-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--bg-main);
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        z-index: 2000;
    }

    .share-header {
        padding: 1rem 1.5rem;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--outline);
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
    }

    .back-btn {
        width: 40px; height: 40px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-main);
        background: var(--surface-variant);
        text-decoration: none;
    }

    .friends-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
    }

    .friend-card {
        background: white;
        border-radius: 1.5rem;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--outline);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: transform 0.2s ease;
    }
    
    .friend-card:active {
        transform: scale(0.98);
    }

    .friend-info {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .friend-avatar {
        width: 48px; height: 48px;
        border-radius: 50%;
        object-fit: cover;
    }

    .send-icon {
        background: var(--primary-light);
        color: var(--primary-dark);
        width: 40px; height: 40px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
    }

</style>
{% endblock %}

{% block content %}
<div class="share-page-container">
    <header class="share-header">
        <a href="{% url 'discover' %}" class="back-btn">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="text-xl font-bold">Share Pulse</h2>
    </header>

    <div class="friends-scroll">
        <div style="margin-bottom: 1.5rem;">
            <p class="text-xs text-muted font-bold uppercase tracking-wider">Select a friend to share with</p>
        </div>

        {% for f in friends %}
        <div class="friend-card" onclick="sharePostTo({{ f.id }})">
            <div class="friend-info">
                <img src="{% if f.profile_pic %}{{ f.profile_pic.url }}{% else %}https://ui-avatars.com/api/?name={{ f.username }}{% endif %}" class="friend-avatar">
                <div>
                    <p class="font-bold">@{{ f.username }}</p>
                </div>
            </div>
            <div class="send-icon" id="send-btn-{{ f.id }}">
                <span class="material-symbols-outlined">send</span>
            </div>
        </div>
        {% empty %}
        <div class="text-center py-10 opacity-50">
            <span class="material-symbols-outlined text-4xl mb-2">person_off</span>
            <p class="font-bold text-sm">No friends yet...</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function sharePostTo(fid) {
        const btn = document.getElementById(`send-btn-${fid}`);
        btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span>';
        
        const res = await fetch('/api/share_post', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({post_id: {{ post.id }}, friend_id: fid})
        });
        
        if (res.ok) {
            btn.innerHTML = '<span class="material-symbols-outlined">check</span>';
            btn.style.background = '#e6ffe6';
            btn.style.color = '#00cc00';
            setTimeout(() => {
                window.location.href = "{% url 'discover' %}";
            }, 800);
        } else {
            const err = await res.json();
            alert("Error: " + (err.error || "Could not share"));
            btn.innerHTML = '<span class="material-symbols-outlined">send</span>';
        }
    }
</script>
{% endblock %}
