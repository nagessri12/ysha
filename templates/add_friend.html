{% extends "base.html" %}

{% block head %}
<style>
    .search-header {
        margin-bottom: 2.5rem;
    }
    
    .search-input-lg {
        width: 100%;
        height: 70px;
        padding: 0 1.5rem 0 4rem;
        background: var(--surface);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--outline);
        border-radius: 2rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-main);
        outline: none;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
    }
    
    .search-input-lg:focus {
        background: white;
        border-color: var(--primary);
        box-shadow: var(--shadow-md);
    }
    
    .result-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem;
        background: var(--surface);
        backdrop-filter: var(--glass-blur);
        border-radius: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.4);
        margin-bottom: 1rem;
        transition: all 0.3s ease;
    }
    
    .result-card:hover {
        background: white;
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
    }
</style>
{% endblock %}

{% block content %}
<div class="discover-container">
    <header class="search-header">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="window.location.href='/home'" class="btn-ghost p-2 rounded-full">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h2 class="text-2xl font-bold mb-1">Find Pulses</h2>
                <p class="text-xs text-muted font-bold uppercase tracking-wider">Discover new friends to chat with</p>
            </div>
        </div>
        
        <div style="position: relative;">
            <span class="material-symbols-outlined" style="position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.5rem;">group_add</span>
            <input id="user-search" oninput="debounceSearch()" class="search-input-lg" placeholder="Enter username..." type="text"/>
        </div>
    </header>

    <!-- Search Results -->
    <div id="search-results">
        <!-- Results go here -->
    </div>
    
    <div id="initial-state" class="text-center py-16" style="opacity: 0.4;">
        <span class="material-symbols-outlined text-primary mb-4" style="font-size: 4rem;">diversity_3</span>
        <p class="text-xs font-bold uppercase tracking-widest italic">The pulse is waiting for you</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let searchTimeout;

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(searchUsers, 400);
}

async function searchUsers() {
    const query = document.getElementById('user-search').value;
    const resultsDiv = document.getElementById('search-results');
    const initialState = document.getElementById('initial-state');
    
    if (query.length < 2) {
        resultsDiv.innerHTML = '';
        initialState.classList.remove('hidden');
        return;
    }
    
    try {
        const res = await fetch(`/api/user_search?q=${query}`);
        const users = await res.json();
        
        initialState.classList.add('hidden');
        resultsDiv.innerHTML = users.map(user => `
            <div class="result-card">
                <div class="notif-user">
                    <img src="https://ui-avatars.com/api/?name=${user.username}" class="avatar" style="width: 50px; height: 50px; border-radius: 1.25rem;">
                    <div>
                        <h3 class="chat-name">@${user.username}</h3>
                        <p class="text-xs text-primary font-bold uppercase tracking-widest">${user.status || 'Active'}</p>
                    </div>
                </div>
                ${user.is_requested ? `
                    <span class="btn-small btn-decline" style="background: var(--outline);">${user.status === 'accepted' ? 'Friends' : 'Requested'}</span>
                ` : `
                    <button onclick="sendRequest(${user.id}, this)" class="btn btn-primary">Request</button>
                `}
            </div>
        `).join('');
    } catch (err) {
        console.error(err);
    }
}

async function sendRequest(id, btn) {
    try {
        const res = await fetch('/api/friend_request/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({receiver_id: id})
        });
        if (res.ok) {
            btn.innerHTML = 'Sent';
            btn.className = 'btn-small btn-decline';
            btn.style.background = 'var(--outline)';
            btn.disabled = true;
        }
    } catch (err) {
        console.error(err);
    }
}
</script>
{% endblock %}
